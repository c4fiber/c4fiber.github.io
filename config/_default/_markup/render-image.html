{{- $img := .Page.Resources.GetMatch .Destination -}}
{{- if $img -}}
  {{/* 포스트 폴더 내에서 이미지를 찾은 경우 */}}
  <img src="{{ $img.RelPermalink }}" 
       alt="{{ .Text }}" 
       {{ with .Title }}title="{{ . }}"{{ end }} 
       loading="lazy">
{{- else -}}
  {{/* 이미지를 찾지 못한 경우 (원본 경로 그대로 출력) */}}
  <img src="{{ .Destination | safeURL }}" 
       alt="{{ .Text }}" 
       {{ with .Title }}title="{{ . }}"{{ end }} 
       loading="lazy">
{{- end -}}
