name: Deploy to Github Pages

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Hugo 리소스 캐싱 (key에 해시값을 추가하여 안정성 확보)
      - name: Cache Hugo resources
        uses: actions/cache@v4
        with:
          path: resources
          key: ${{ runner.os }}-hugo-${{ hashFiles('**/hugo.toml', '**/config.toml') }}
          restore-keys: |
            ${{ runner.os }}-hugo-

      # Go 최신 버전 설정 (v5는 Node 20 지원)
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable' # 공부 중이신 Go의 최신 안정 버전을 유지합니다.
      
      - run: go version

      # Hugo 설치 (v3로 업데이트하여 Node 20 이슈 해결)
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build
        run: hugo --minify --gc

      # 배포 (v4 유지하되 내부 종속성 최신화 확인)
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: public
          clean: true
          single-commit: true
